<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酒店住宿 - 老君山</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Noto+Sans+SC:400,500,700&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #c8102e;
            --text-color: #333;
            --bg-color: #f8f9fa;
            --card-bg: rgba(255,255,255,0.95);
            --shadow: 0 2px 15px rgba(0,0,0,0.08);
        }
        body {
            font-family: "Noto Sans SC", sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
        }
        #header-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(255,255,255,0.95);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            z-index: 1000;
        }
        .nav-logo {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
        }
        #main-nav { display: flex; list-style: none; }
        .main-nav-item { margin-left: 35px; }
        .main-nav-link {
            color: #333;
            text-decoration: none;
            font-weight: 500;
        }
        .main-nav-link:hover { color: var(--primary-color); }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 100px 20px 40px;
        }
        .page-title {
            text-align: center;
            font-size: 30px;
            color: var(--primary-color);
            margin-bottom: 40px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }
        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }
        .title {
            font-size: 22px;
            margin-bottom: 10px;
            color: var(--primary-color);
        }
        .meta {
            color: #666;
            line-height: 1.8;
            margin-bottom: 16px;
        }
        .price {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 18px;
        }
        .btn {
            padding: 10px 18px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            #header-nav { padding: 0 20px; }
            .main-nav-item { margin-left: 20px; }
            .grid { grid-template-columns: 1fr; }
            .page-title { font-size: 26px; }
        }
    </style>
</head>
<body>
    <nav id="header-nav">
        <a href="index.html" class="nav-logo">老君山</a>
        <ul id="main-nav">
            <li class="main-nav-item"><a href="index.html" class="main-nav-link">首页</a></li>
            <li class="main-nav-item"><a href="scenery.html" class="main-nav-link">景点大全</a></li>
            <li class="main-nav-item"><a href="ticket.html" class="main-nav-link">门票预订</a></li>
            <li class="main-nav-item"><a href="hotel.html" class="main-nav-link">酒店住宿</a></li>
            <li class="main-nav-item"><a href="comment.html" class="main-nav-link">游客评价</a></li>
            <li class="main-nav-item"><a href="user.html" class="main-nav-link">个人中心</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2 class="page-title">酒店住宿预订</h2>
        <div class="grid">
            <div class="card">
                <div class="title">老君山精品民宿</div>
                <div class="meta">步行可达景区入口，安静舒适，适合家庭与朋友同行。</div>
                <div class="price">¥280 / 晚</div>
                <button class="btn" onclick="book('老君山精品民宿', 280)">立即预订</button>
            </div>
            <div class="card">
                <div class="title">景区观景酒店</div>
                <div class="meta">高层观景房，适合看日出云海，含次日早餐与接驳服务。</div>
                <div class="price">¥480 / 晚</div>
                <button class="btn" onclick="book('景区观景酒店', 480)">立即预订</button>
            </div>
        </div>
    </div>

    <script>
        function book(name, price) {
            localStorage.setItem("hotel", name + " " + price + "元");
            alert("预订成功");
        }
    </script>
</body>
</html>
