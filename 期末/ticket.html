<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>门票预订 - 老君山</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Noto+Sans+SC:400,500,700&display=swap">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root { --primary-color:#c8102e; --bg-color:#f8f9fa; --card-bg:#fff; }
        body { font-family:"Noto Sans SC", sans-serif; background:var(--bg-color); }
        #header-nav {
            position:fixed; top:0; left:0; width:100%; height:60px;
            background:rgba(255,255,255,0.95); display:flex;
            align-items:center; justify-content:space-between; padding:0 50px; z-index:1000;
        }
        .nav-logo { color:var(--primary-color); font-size:22px; font-weight:700; text-decoration:none; }
        #main-nav { display:flex; list-style:none; }
        .main-nav-item { margin-left:35px; }
        .main-nav-link { color:#333; text-decoration:none; font-weight:500; }

        .container { max-width:800px; margin:0 auto; padding:100px 20px; }
        .box { background:var(--card-bg); padding:30px; border-radius:12px; }
        h2 { color:var(--primary-color); margin-bottom:20px; }
        .item { margin-bottom:15px; }
        label { display:block; margin-bottom:5px; }
        select,input { width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; }
        .btn {
            background:var(--primary-color); color:#fff; border:none;
            padding:12px; width:100%; border-radius:6px; font-size:16px; margin-top:10px;
            cursor:pointer;
        }
        #price { font-size:20px; color:var(--primary-color); margin-top:15px; }
    </style>
</head>
<body>
    <nav id="header-nav">
        <a href="index.html" class="nav-logo">老君山</a>
        <ul id="main-nav">
            <li class="main-nav-item"><a href="index.html">首页</a></li>
            <li class="main-nav-item"><a href="scenery.html">景点大全</a></li>
            <li class="main-nav-item"><a href="ticket.html">门票预订</a></li>
            <li class="main-nav-item"><a href="hotel.html">酒店住宿</a></li>
            <li class="main-nav-item"><a href="comment.html">评价</a></li>
            <li class="main-nav-item"><a href="user.html">个人中心</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="box">
            <h2>门票在线预订</h2>
            <div class="item">
                <label>票种</label>
                <select id="type">
                    <option value="100">成人票 100元</option>
                    <option value="50">学生票 50元</option>
                    <option value="50">老人票 50元</option>
                </select>
            </div>
            <div class="item">
                <label>数量</label>
                <input type="number" id="num" value="1" min="1" oninput="calc()">
            </div>
            <div class="item">
                <label>姓名</label>
                <input id="name" placeholder="请输入姓名">
            </div>
            <div class="item">
                <label>手机号</label>
                <input id="phone" placeholder="请输入手机号">
            </div>
            <div id="price">总价：¥100</div>
            <button class="btn" onclick="buy()">立即预订</button>
        </div>
    </div>

    <script>
        function calc(){
            let t = document.getElementById('type').value;
            let n = document.getElementById('num').value;
            document.getElementById('price').innerText = '总价：¥'+(t*n);
        }
        function buy(){
            let obj = {
                name:document.getElementById('name').value,
                phone:document.getElementById('phone').value,
                total:document.getElementById('type').value * document.getElementById('num').value,
                time:new Date().toLocaleString()
            };
            localStorage.setItem('order',JSON.stringify(obj));
            alert('预订成功！请到个人中心查看');
        }
    </script>
</body>
</html>
