<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>门票预订 - 老君山</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Noto+Sans+SC:400,500,700&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #c8102e;
            --text-color: #333;
            --bg-color: #f8f9fa;
            --card-bg: rgba(255,255,255,0.95);
            --shadow: 0 2px 15px rgba(0,0,0,0.08);
        }
        body {
            font-family: "Noto Sans SC", sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
        }
        #header-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(255,255,255,0.95);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            z-index: 1000;
        }
        .nav-logo {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
        }
        #main-nav { display: flex; list-style: none; }
        .main-nav-item { margin-left: 35px; }
        .main-nav-link {
            color: #333;
            text-decoration: none;
            font-weight: 500;
        }
        .main-nav-link:hover { color: var(--primary-color); }
        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 100px 20px 40px;
        }
        .box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }
        .page-title {
            text-align: center;
            font-size: 30px;
            color: var(--primary-color);
            margin-bottom: 30px;
        }
        .item { margin-bottom: 16px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }
        select,
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font: inherit;
        }
        .btn {
            background: var(--primary-color);
            color: #fff;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
        }
        #price {
            font-size: 22px;
            color: var(--primary-color);
            margin-top: 18px;
            font-weight: 700;
        }
        @media (max-width: 768px) {
            #header-nav { padding: 0 20px; }
            .main-nav-item { margin-left: 20px; }
            .page-title { font-size: 26px; }
        }
    </style>
</head>
<body>
    <nav id="header-nav">
        <a href="index.html" class="nav-logo">老君山</a>
        <ul id="main-nav">
            <li class="main-nav-item"><a href="index.html" class="main-nav-link">首页</a></li>
            <li class="main-nav-item"><a href="scenery.html" class="main-nav-link">景点大全</a></li>
            <li class="main-nav-item"><a href="ticket.html" class="main-nav-link">门票预订</a></li>
            <li class="main-nav-item"><a href="hotel.html" class="main-nav-link">酒店住宿</a></li>
            <li class="main-nav-item"><a href="comment.html" class="main-nav-link">游客评价</a></li>
            <li class="main-nav-item"><a href="user.html" class="main-nav-link">个人中心</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="box">
            <h2 class="page-title">门票在线预订</h2>
            <div class="item">
                <label for="type">票种</label>
                <select id="type" onchange="calc()">
                    <option value="100">成人票 100元</option>
                    <option value="50">学生票 50元</option>
                    <option value="50">老人票 50元</option>
                </select>
            </div>
            <div class="item">
                <label for="num">数量</label>
                <input type="number" id="num" value="1" min="1" oninput="calc()">
            </div>
            <div class="item">
                <label for="name">姓名</label>
                <input id="name" placeholder="请输入姓名">
            </div>
            <div class="item">
                <label for="phone">手机号</label>
                <input id="phone" placeholder="请输入手机号">
            </div>
            <div id="price">总价：100元</div>
            <button class="btn" onclick="buy()">立即预订</button>
        </div>
    </div>

    <script>
        function calc() {
            const ticketType = Number(document.getElementById("type").value);
            const count = Number(document.getElementById("num").value || 1);
            document.getElementById("price").innerText = "总价：" + ticketType * count + "元";
        }

        function buy() {
            const obj = {
                name: document.getElementById("name").value,
                phone: document.getElementById("phone").value,
                total: Number(document.getElementById("type").value) * Number(document.getElementById("num").value || 1),
                time: new Date().toLocaleString()
            };
            localStorage.setItem("order", JSON.stringify(obj));
            alert("预订成功，请到个人中心查看");
        }

        calc();
    </script>
</body>
</html>
