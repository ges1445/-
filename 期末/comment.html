<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游客评价 - 老君山</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#c8102e;--bg:#f8f9fa}
        body{font-family:"Noto Sans SC",sans-serif;background:var(--bg)}
        #header-nav{position:fixed;top:0;left:0;width:100%;height:60px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 50px;z-index:1000}
        .nav-logo{color:var(--primary);font-size:22px;font-weight:700;text-decoration:none}
        #main-nav{display:flex;list-style:none}
        .main-nav-item{margin-left:35px}
        .main-nav-link{color:#333;text-decoration:none}
        .container{max-width:800px;margin:0 auto;padding:100px 20px}
        .box{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px}
        textarea{width:100%;height:100px;padding:10px;border:1px solid #ddd;border-radius:6px}
        .btn{background:var(--primary);color:#fff;border:none;padding:10px 15px;border-radius:6px;cursor:pointer}
        .item{border-bottom:1px solid #eee;padding:10px 0}
        .name{font-weight:500}
        .content{margin:5px 0;color:#666}
    </style>
</head>
<body>
    <nav id="header-nav">
        <a href="index.html" class="nav-logo">老君山</a>
        <ul id="main-nav">
            <li class="main-nav-item"><a href="index.html">首页</a></li>
            <li class="main-nav-item"><a href="scenery.html">景点</a></li>
            <li class="main-nav-item"><a href="ticket.html">门票</a></li>
            <li class="main-nav-item"><a href="hotel.html">酒店</a></li>
            <li class="main-nav-item"><a href="comment.html">评价</a></li>
            <li class="main-nav-item"><a href="user.html">我的</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="box">
            <h3 style="margin-bottom:15px;color:var(--primary)">发表评价</h3>
            <textarea id="msg" placeholder="分享你的游玩体验"></textarea>
            <button class="btn" onclick="send()" style="margin-top:10px">发布</button>
        </div>
        <div id="list"></div>
    </div>

    <script>
        function send(){
            let val = document.getElementById('msg').value;
            if(!val)return alert('请输入内容');
            let arr = JSON.parse(localStorage.getItem('comment')||'[]');
            arr.push({content:val,time:new Date().toLocaleString()});
            localStorage.setItem('comment',JSON.stringify(arr));
            show();
        }
        function show(){
            let arr = JSON.parse(localStorage.getItem('comment')||'[]');
            let html='';
            arr.forEach(i=>{
                html+=`<div class="box"><div class="name">游客</div><div class="content">${i.content}</div><div style="font-size:12px;color:#999">${i.time}</div></div>`;
            });
            document.getElementById('list').innerHTML=html;
        }
        show();
    </script>
</body>
</html>
