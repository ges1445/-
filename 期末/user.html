<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 老君山</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#c8102e;--bg:#f8f9fa}
        body{font-family:"Noto Sans SC",sans-serif;background:var(--bg)}
        #header-nav{position:fixed;top:0;left:0;width:100%;height:60px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 50px;z-index:1000}
        .nav-logo{color:var(--primary);font-size:22px;font-weight:700;text-decoration:none}
        #main-nav{display:flex;list-style:none}
        .main-nav-item{margin-left:35px}
        .main-nav-link{color:#333;text-decoration:none}
        .container{max-width:800px;margin:0 auto;padding:100px 20px}
        .card{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px}
        h3{color:var(--primary);margin-bottom:15px}
        .btn{background:var(--primary);color:#fff;border:none;padding:10px 15px;border-radius:6px;width:100%;cursor:pointer}
    </style>
</head>
<body>
    <nav id="header-nav">
        <a href="index.html" class="nav-logo">老君山</a>
        <ul id="main-nav">
            <li class="main-nav-item"><a href="index.html">首页</a></li>
            <li class="main-nav-item"><a href="scenery.html">景点</a></li>
            <li class="main-nav-item"><a href="ticket.html">门票</a></li>
            <li class="main-nav-item"><a href="hotel.html">酒店</a></li>
            <li class="main-nav-item"><a href="comment.html">评价</a></li>
            <li class="main-nav-item"><a href="user.html">我的</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h3>我的门票订单</h3>
            <div id="order"></div>
        </div>
        <div class="card">
            <h3>我的酒店预订</h3>
            <div id="hotel"></div>
        </div>
        <div class="card">
            <h3>我的收藏景点</h3>
            <div id="collect"></div>
        </div>
        <button class="btn" onclick="logout()">退出登录</button>
    </div>

    <script>
        document.getElementById('order').innerText = localStorage.getItem('order')||'暂无订单';
        document.getElementById('hotel').innerText = localStorage.getItem('hotel')||'暂无预订';
        let c = JSON.parse(localStorage.getItem('collect')||'[]');
        document.getElementById('collect').innerText = c.length>0 ? c.map(i=>i.name).join('，') : '暂无收藏';
        function logout(){
            alert('退出成功');
            location.href='index.html';
        }
    </script>
</body>
</html>
