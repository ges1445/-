<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 老君山</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Noto+Sans+SC:400,500,700&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #c8102e;
            --text-color: #333;
            --bg-color: #f8f9fa;
            --card-bg: rgba(255,255,255,0.95);
            --shadow: 0 2px 15px rgba(0,0,0,0.08);
            --muted-color: #777;
        }
        body {
            font-family: "Noto Sans SC", sans-serif;
            background: linear-gradient(180deg, #fff7f8 0%, var(--bg-color) 240px);
            color: var(--text-color);
        }
        #header-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(255,255,255,0.95);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            z-index: 1000;
        }
        .nav-logo {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
        }
        #main-nav { display: flex; list-style: none; }
        .main-nav-item { margin-left: 35px; }
        .main-nav-link {
            color: #333;
            text-decoration: none;
            font-weight: 500;
        }
        .main-nav-link:hover { color: var(--primary-color); }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 100px 20px 40px;
        }
        .hero-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 28px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }
        .hero-head {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 24px;
        }
        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c8102e, #ef5a70);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            box-shadow: 0 10px 24px rgba(200,16,46,0.22);
        }
        .eyebrow {
            color: var(--primary-color);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .hero-title {
            font-size: 30px;
            margin-bottom: 6px;
        }
        .hero-desc {
            color: var(--muted-color);
            line-height: 1.8;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }
        .summary-card {
            background: #fff;
            border-radius: 14px;
            padding: 20px;
            border: 1px solid #f1d8dd;
        }
        .summary-label {
            font-size: 14px;
            color: var(--muted-color);
            margin-bottom: 10px;
        }
        .summary-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 8px;
        }
        .summary-note {
            color: #666;
            line-height: 1.7;
        }
        .panel-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }
        .panel {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
        }
        .panel-wide { grid-column: 1 / -1; }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }
        .panel-title {
            font-size: 22px;
            color: var(--primary-color);
        }
        .badge {
            min-width: 38px;
            padding: 4px 10px;
            border-radius: 999px;
            background: #fff0f3;
            color: var(--primary-color);
            text-align: center;
            font-size: 13px;
            font-weight: 700;
        }
        .detail-list {
            display: grid;
            gap: 12px;
        }
        .detail-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            background: #fff;
            border: 1px solid #f3f3f3;
        }
        .detail-key {
            color: var(--muted-color);
            font-size: 14px;
        }
        .detail-value {
            text-align: right;
            font-weight: 500;
        }
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .tag {
            padding: 10px 14px;
            border-radius: 999px;
            background: #fff;
            border: 1px solid #f1d8dd;
            color: var(--primary-color);
            font-weight: 500;
        }
        .empty {
            padding: 24px;
            border-radius: 12px;
            background: #fff;
            color: #888;
            text-align: center;
            border: 1px dashed #e3c6cc;
        }
        .logout-wrap {
            margin-top: 24px;
            display: flex;
            justify-content: flex-end;
        }
        .btn {
            padding: 10px 18px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            #header-nav { padding: 0 20px; }
            .main-nav-item { margin-left: 20px; }
            .hero-head {
                flex-direction: column;
                align-items: flex-start;
            }
            .hero-title { font-size: 26px; }
            .summary-grid,
            .panel-grid { grid-template-columns: 1fr; }
            .panel-wide { grid-column: auto; }
            .detail-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .detail-value { text-align: left; }
            .logout-wrap { justify-content: stretch; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <nav id="header-nav">
        <a href="index.html" class="nav-logo">老君山</a>
        <ul id="main-nav">
            <li class="main-nav-item"><a href="index.html" class="main-nav-link">首页</a></li>
            <li class="main-nav-item"><a href="scenery.html" class="main-nav-link">景点大全</a></li>
            <li class="main-nav-item"><a href="ticket.html" class="main-nav-link">门票预订</a></li>
            <li class="main-nav-item"><a href="hotel.html" class="main-nav-link">酒店住宿</a></li>
            <li class="main-nav-item"><a href="comment.html" class="main-nav-link">游客评价</a></li>
            <li class="main-nav-item"><a href="user.html" class="main-nav-link">个人中心</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="hero-card">
            <div class="hero-head">
                <div class="avatar">游</div>
                <div>
                    <div class="eyebrow">PERSONAL CENTER</div>
                    <h2 class="hero-title">你的老君山行程</h2>
                    <p class="hero-desc">这里汇总门票订单、酒店预订和收藏景点，让个人中心不再只是几行纯文本。</p>
                </div>
            </div>
            <div class="summary-grid">
                <div class="summary-card">
                    <div class="summary-label">门票订单</div>
                    <div class="summary-value" id="order-count">0</div>
                    <div class="summary-note" id="order-summary">暂无门票订单</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">酒店预订</div>
                    <div class="summary-value" id="hotel-count">0</div>
                    <div class="summary-note" id="hotel-summary">暂无酒店预订</div>
                </div>
                <div class="summary-card">
                    <div class="summary-label">收藏景点</div>
                    <div class="summary-value" id="collect-count">0</div>
                    <div class="summary-note" id="collect-summary">还没有收藏景点</div>
                </div>
            </div>
        </div>

        <div class="panel-grid">
            <div class="panel">
                <div class="panel-header">
                    <h3 class="panel-title">门票订单</h3>
                    <span class="badge" id="order-badge">0</span>
                </div>
                <div id="order"></div>
            </div>
            <div class="panel">
                <div class="panel-header">
                    <h3 class="panel-title">酒店预订</h3>
                    <span class="badge" id="hotel-badge">0</span>
                </div>
                <div id="hotel"></div>
            </div>
            <div class="panel panel-wide">
                <div class="panel-header">
                    <h3 class="panel-title">收藏景点</h3>
                    <span class="badge" id="collect-badge">0</span>
                </div>
                <div id="collect"></div>
            </div>
        </div>

        <div class="logout-wrap">
            <button class="btn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <script>
        function escapeHtml(text) {
            return String(text).replace(/[&<>"']/g, function(char) {
                return {
                    "&": "&amp;",
                    "<": "&lt;",
                    ">": "&gt;",
                    '"': "&quot;",
                    "'": "&#39;"
                }[char];
            });
        }

        function renderOrder(order) {
            if (!order) {
                return '<div class="empty">暂无订单，去门票预订页添加一笔行程。</div>';
            }
            return `
                <div class="detail-list">
                    <div class="detail-row">
                        <div class="detail-key">姓名</div>
                        <div class="detail-value">${escapeHtml(order.name || "未填写")}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-key">手机号</div>
                        <div class="detail-value">${escapeHtml(order.phone || "未填写")}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-key">总价</div>
                        <div class="detail-value">¥${escapeHtml(order.total || 0)}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-key">下单时间</div>
                        <div class="detail-value">${escapeHtml(order.time || "暂无记录")}</div>
                    </div>
                </div>
            `;
        }

        function renderHotel(hotel) {
            if (!hotel) {
                return '<div class="empty">暂无酒店预订，预订后会显示在这里。</div>';
            }
            const parts = String(hotel).split(" ");
            const hotelName = parts[0] || hotel;
            const hotelPrice = parts.slice(1).join(" ") || "待确认";
            return `
                <div class="detail-list">
                    <div class="detail-row">
                        <div class="detail-key">酒店名称</div>
                        <div class="detail-value">${escapeHtml(hotelName)}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-key">价格信息</div>
                        <div class="detail-value">${escapeHtml(hotelPrice)}</div>
                    </div>
                </div>
            `;
        }

        function renderCollect(collect) {
            if (!collect.length) {
                return '<div class="empty">暂无收藏景点，浏览景点大全后可以直接收藏。</div>';
            }
            return `
                <div class="tag-list">
                    ${collect.map(function(item) {
                        return '<div class="tag">' + escapeHtml(item.name || "未命名景点") + "</div>";
                    }).join("")}
                </div>
            `;
        }

        const order = JSON.parse(localStorage.getItem("order") || "null");
        const hotel = localStorage.getItem("hotel");
        const collect = JSON.parse(localStorage.getItem("collect") || "[]");

        document.getElementById("order").innerHTML = renderOrder(order);
        document.getElementById("hotel").innerHTML = renderHotel(hotel);
        document.getElementById("collect").innerHTML = renderCollect(collect);

        document.getElementById("order-count").innerText = order ? "1" : "0";
        document.getElementById("hotel-count").innerText = hotel ? "1" : "0";
        document.getElementById("collect-count").innerText = String(collect.length);

        document.getElementById("order-badge").innerText = order ? "1" : "0";
        document.getElementById("hotel-badge").innerText = hotel ? "1" : "0";
        document.getElementById("collect-badge").innerText = String(collect.length);

        document.getElementById("order-summary").innerText = order ? ("最近一笔订单金额 ¥" + order.total) : "暂无门票订单";
        document.getElementById("hotel-summary").innerText = hotel ? "已保存 1 条酒店预订信息" : "暂无酒店预订";
        document.getElementById("collect-summary").innerText = collect.length ? ("已收藏 " + collect.length + " 个景点") : "还没有收藏景点";

        function logout() {
            alert("退出成功");
            location.href = "index.html";
        }
    </script>
</body>
</html>
